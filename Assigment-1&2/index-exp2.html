<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>DOM Study</title>
        <link rel="stylesheet" href="./style-exp2.css">
    </head>
    <body>
        <div class="container">
            <h1>Employee Management System</h1>
            <div class="employee-form">
                <h2>Add Employee</h2>
                <input type="text" id="name" placeholder="Name">
                <input type="text" id="position" placeholder="Position">
                <input type="number" id="salary" placeholder="Salary">
                <input type="text" id="department" placeholder="Department">
                <button id="addEmployee">Add Employee</button>
            </div>
            <button onclick="displayEmployees()">Display Emps</button>
            <button onclick="filterSalary()">Filter Sal</button>
            <button onclick="totalSalary()">Filter Dept</button>
        </div>

        <script src="./script-exp2.js"></script>
    </body>
</html>
